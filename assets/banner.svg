<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Easywrite — make AI-assisted academic writing read human while staying evidence-true, in EN and 中文">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a12"/>
      <stop offset="0.5" stop-color="#171029"/>
      <stop offset="1" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="title" x1="96" y1="150" x2="640" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c9b8ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#c0392b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <style>
      .t  { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
      .cjk{ font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1280" height="400" rx="20" fill="url(#bg)"/>
  <ellipse cx="1040" cy="120" rx="380" ry="300" fill="url(#glow)"/>

  <!-- faint baseline rules (a nod to writing on lined paper) -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="96" y1="300" x2="1184" y2="300"/>
    <line x1="96" y1="330" x2="1184" y2="330"/>
    <line x1="96" y1="360" x2="1184" y2="360"/>
  </g>

  <!-- accent bar -->
  <rect x="96" y="92" width="64" height="7" rx="3.5" fill="url(#accent)"/>

  <!-- wordmark -->
  <text x="94" y="196" class="t" font-size="104" font-weight="800" letter-spacing="-3" fill="url(#title)">Easywrite</text>

  <!-- subtitle -->
  <text x="98" y="246" class="t" font-size="27" font-weight="500" fill="#e7e3f7">Academic writing that reads <tspan font-weight="700" fill="#ffffff">human</tspan> and stays <tspan font-weight="700" fill="#ffffff">evidence&#8209;true</tspan>.</text>

  <!-- feature chips -->
  <g class="t" font-size="19" font-weight="600">
    <g transform="translate(98,286)">
      <rect width="150" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#7c5cff" stroke-opacity="0.5"/>
      <text x="75" y="26" text-anchor="middle" fill="#d9d2ff" class="cjk">EN + 中文</text>
    </g>
    <g transform="translate(262,286)">
      <rect width="210" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#7c5cff" stroke-opacity="0.5"/>
      <text x="105" y="26" text-anchor="middle" fill="#d9d2ff">claim &#8596; evidence</text>
    </g>
    <g transform="translate(486,286)">
      <rect width="196" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#7c5cff" stroke-opacity="0.5"/>
      <text x="98" y="26" text-anchor="middle" fill="#d9d2ff">detector science</text>
    </g>
    <g transform="translate(696,286)">
      <rect width="196" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#7c5cff" stroke-opacity="0.5"/>
      <text x="98" y="26" text-anchor="middle" fill="#d9d2ff">integrity firewall</text>
    </g>
  </g>

  <!-- emblem: a nib + check, signalling "written, and verified true" -->
  <g transform="translate(980,150)">
    <circle cx="90" cy="0" r="104" fill="#ffffff" fill-opacity="0.03" stroke="#7c5cff" stroke-opacity="0.35" stroke-width="1.5"/>
    <!-- pen nib -->
    <g transform="translate(38,-58)" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
      <path d="M6 96 L54 8 C60 -2 74 -2 80 8 L104 52 C110 62 104 76 92 78 L18 108 Z"/>
      <line x1="46" y1="30" x2="82" y2="94"/>
      <circle cx="64" cy="62" r="7" fill="url(#accent)" stroke="none"/>
    </g>
    <!-- verified check badge -->
    <g transform="translate(118,34)">
      <circle cx="0" cy="0" r="30" fill="#1db67a"/>
      <path d="M-13 1 L-4 11 L14 -12" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- footer meta -->
  <text x="1184" y="372" text-anchor="end" class="t" font-size="17" font-weight="600" fill="#8a83a8">agent skill · MIT · EN + 中文</text>
</svg>
